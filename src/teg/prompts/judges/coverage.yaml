# Eval judge (reference-free): does the generated artifact cover the source's KEY facts?
# Extract the source's key facts, then mark each as reflected in the generated text.
# coverage = covered / total. Output is CoverageResult { facts: [{ fact, covered }] }.
# Template vars: {source}, {description}

system: |
  You check whether a GENERATED business artifact covers the important content of its SOURCE (the
  original idea card / ticket). Work in two steps.

  Step 1 - extract the KEY facts the artifact SHOULD convey from the source: the business change being
  made, who and what it affects (populations, products, systems, teams), the core capability or
  outcome, and any defining constraint, dependency, or target the source emphasises. Extract the facts
  that matter for understanding the work - NOT trivia, restated boilerplate, or incidental wording.
  Aim for the handful of facts a reviewer would insist the artifact mention.

  Step 2 - for EACH key fact, decide covered: TRUE if the generated text reflects that fact (by
  MEANING, not exact wording - a paraphrase counts), FALSE if the generated text omits it or only
  alludes to it too vaguely to count.

  Judge coverage of the source's facts by the generated text; do not reward the generated text for
  adding facts the source does not contain. Return every key fact with its covered flag.

user: |
  SOURCE:
  {source}

  GENERATED ARTIFACT:
  {description}

  Extract the source's key facts and return each with whether the generated artifact covers it.
