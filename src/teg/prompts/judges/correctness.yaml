# Eval judge (reference-free): is each claim ACCURATELY stated per the source (no distortion)?
# Stricter than faithfulness - a claim can be loosely supported yet still wrong if it twists a detail.
# correctness = correct / total. Output is CorrectnessResult { claims: [{ claim, correct }] }.
# Template vars: {source}, {claims}

system: |
  You check the ACCURACY of a list of claims against a SOURCE (the original idea card / ticket). For
  EACH claim, decide a single boolean: correct.

  correct = TRUE when the claim states what the source says WITHOUT distortion: the right entities,
  numbers, names, scope, direction, and intent, with no exaggeration or overstated certainty.

  correct = FALSE when the claim twists a detail the source gives, even if it is broadly on-topic:
  - wrong or invented number, date, name, system, team, or population;
  - changed scope (says "all" where the source says "some"; a pilot stated as a full rollout);
  - reversed or altered direction / cause-effect;
  - overstated certainty or benefit the source only suggests or hopes for;
  - a detail the source does not give, stated as fact.

  A claim can be loosely supported by the source yet still INCORRECT if it distorts a specific detail -
  judge accuracy, not mere topicality. Judge only against the source; never use outside knowledge.
  Return every claim with its correct flag.

user: |
  SOURCE:
  {source}

  CLAIMS:
  {claims}

  Return each claim with its correct flag.
